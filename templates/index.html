<!DOCTYPE html>
<html>
<head>
    <title>House Price Prediction</title>
    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>House Price Prediction</h1>

    <form action="/predict" method="POST">

        <input type="number"
               name="area"
               placeholder="Area"
               required>

        <input type="number"
               name="bedrooms"
               placeholder="Bedrooms"
               required>

        <input type="number"
               name="bathrooms"
               placeholder="Bathrooms"
               required>

        <input type="number"
               name="age"
               placeholder="Age"
               required>

        <button type="submit">
            Predict Price
        </button>

    </form>

    {% if prediction %}
        <h2>
            Predicted Price:
            ₹ {{ prediction }}
        </h2>
    {% endif %}

</div>

</body>
</html>
